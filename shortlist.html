<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Completion Queue · Batch 1</title>
<style>
  :root {
    --bg: #1b2838;
    --bg2: #213347;
    --card: #2a3f5a;
    --card-hi: #32506f;
    --accent: #66c0f4;
    --accent-dim: #417a9b;
    --text: #c7d5e0;
    --muted: #8f98a0;
    --green: #5ba32b;
    --amber: #d9a441;
    --red: #c0492f;
    --done: #4c6b22;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Motiva Sans", "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, var(--bg) 0%, #16202d 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  h1 {
    font-size: 30px; font-weight: 700; margin: 0 0 6px;
    color: #fff; letter-spacing: .3px;
  }
  .sub { color: var(--muted); font-size: 14px; }
  .sub b { color: var(--accent); font-weight: 600; }

  .progress-wrap {
    margin: 18px 0 30px; background: var(--bg2);
    border-radius: 8px; padding: 14px 16px;
    border: 1px solid #0e1722;
  }
  .progress-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
  .bar { height: 10px; background: #0e1722; border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); transition: width .35s ease; }

  .card {
    display: flex; align-items: center; gap: 16px;
    background: var(--card); border: 1px solid #0e1722;
    border-radius: 10px; padding: 16px 18px; margin-bottom: 12px;
    transition: background .2s, transform .12s, opacity .25s;
    position: relative; overflow: hidden;
  }
  .card:hover { background: var(--card-hi); transform: translateY(-1px); }
  .card.done { opacity: .5; background: var(--done); }
  .card.done .name { text-decoration: line-through; }

  .order {
    flex: 0 0 38px; height: 38px; border-radius: 50%;
    background: var(--bg2); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; border: 1px solid var(--accent-dim);
  }
  .card.current .order { background: var(--accent); color: #0b1622; border-color: var(--accent); }

  .body { flex: 1 1 auto; min-width: 0; }
  .name {
    font-size: 17px; font-weight: 600; color: #fff;
    text-decoration: none; display: inline-block;
  }
  .name:hover { color: var(--accent); }
  .tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag {
    font-size: 11.5px; padding: 2px 9px; border-radius: 20px;
    background: var(--bg2); color: var(--text); border: 1px solid #0e1722;
  }
  .tag.style { background: #2c4b66; color: #cfe6f5; }
  .floor { font-weight: 600; }
  .floor.green { color: #8fd44e; }
  .floor.amber { color: var(--amber); }
  .floor.red { color: #ef7d63; }
  .badge-current {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .6px;
    background: var(--accent); color: #0b1622; padding: 2px 8px;
    border-radius: 4px; font-weight: 700;
  }

  .meta { flex: 0 0 auto; text-align: right; margin-right: 4px; }
  .hours { font-size: 18px; font-weight: 700; color: #fff; }
  .hours span { font-size: 12px; color: var(--muted); font-weight: 400; }
  .score { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

  .check { flex: 0 0 auto; }
  .check input {
    width: 24px; height: 24px; cursor: pointer; accent-color: var(--green);
  }

  footer { margin-top: 26px; text-align: center; color: var(--muted); font-size: 12px; }
  .reset { color: var(--accent-dim); cursor: pointer; text-decoration: underline; }
  .reset:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎯 Completion Queue · Batch 1</h1>
    <div class="sub">Mechanical-first, no two the same genre — clear them top to bottom. <b id="total">~55.8h</b> of grinding across <b>7 games</b>.</div>
  </header>

  <div class="progress-wrap">
    <div class="progress-row">
      <span id="progress-label">0 of 7 done</span>
      <span id="progress-hours">0h cleared</span>
    </div>
    <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
  </div>

  <div id="list"></div>

  <footer>
    Progress saved in your browser. <span class="reset" id="reset">Reset checklist</span>
  </footer>
</div>

<script>
const GAMES = [
  { id: 265890,  name: "Hexcells",                                  hours: 2.7,  score: 68.7, style: "Logic-grid puzzle",  floor: 53, current: true },
  { id: 255520,  name: "Viscera Cleanup Detail: Shadow Warrior",    hours: 2.2,  score: 49.7, style: "Cleaning sim",       floor: 12 },
  { id: 1921780, name: "The Sushi Spinnery",                        hours: 20.8, score: 46.5, style: "Management / idle",   floor: 14 },
  { id: 365770,  name: "Volume",                                    hours: 8.2,  score: 47.5, style: "Stealth-action",      floor: 2,  warn: "one rare achievement — possible grind" },
  { id: 209630,  name: "Magrunner: Dark Pulse",                     hours: 10.7, score: 48.3, style: "Physics puzzle",      floor: 9 },
  { id: 251830,  name: "Stick It To The Man!",                      hours: 5.7,  score: 47.4, style: "Puzzle-platformer",   floor: 7 },
  { id: 361850,  name: "Portal of Evil: Stolen Runes",             hours: 5.5,  score: 47.1, style: "Hidden-object",       floor: 4 },
];
const KEY = "completion-queue-batch1";
const done = JSON.parse(localStorage.getItem(KEY) || "{}");

function floorClass(f) { return f >= 15 ? "green" : f >= 7 ? "amber" : "red"; }

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  GAMES.forEach((g, i) => {
    const isDone = !!done[g.id];
    const card = document.createElement("div");
    card.className = "card" + (isDone ? " done" : "") + (g.current && !isDone ? " current" : "");
    card.innerHTML = `
      <div class="order">${i + 1}</div>
      <div class="check"><input type="checkbox" ${isDone ? "checked" : ""} data-id="${g.id}"></div>
      <div class="body">
        <a class="name" href="https://store.steampowered.com/app/${g.id}/" target="_blank" rel="noopener">${g.name}</a>
        <div class="tags">
          <span class="tag style">${g.style}</span>
          <span class="tag">toughest ach: <span class="floor ${floorClass(g.floor)}">${g.floor}%</span> unlock</span>
          ${g.warn ? `<span class="tag" style="color:#ef7d63">⚠️ ${g.warn}</span>` : ""}
          ${g.current && !isDone ? `<span class="badge-current">▶ playing now</span>` : ""}
        </div>
      </div>
      <div class="meta">
        <div class="hours">${g.hours}<span>h</span></div>
        <div class="score">score ${g.score}</div>
      </div>`;
    list.appendChild(card);
  });
  updateProgress();
}

function updateProgress() {
  const total = GAMES.length;
  const cleared = GAMES.filter(g => done[g.id]);
  const pct = (cleared.length / total) * 100;
  const hrs = cleared.reduce((s, g) => s + g.hours, 0);
  document.getElementById("bar-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = `${cleared.length} of ${total} done`;
  document.getElementById("progress-hours").textContent = `${hrs.toFixed(1)}h cleared`;
}

document.getElementById("list").addEventListener("change", e => {
  if (e.target.matches("input[type=checkbox]")) {
    const id = e.target.dataset.id;
    if (e.target.checked) done[id] = true; else delete done[id];
    localStorage.setItem(KEY, JSON.stringify(done));
    render();
  }
});

document.getElementById("reset").addEventListener("click", () => {
  Object.keys(done).forEach(k => delete done[k]);
  localStorage.removeItem(KEY);
  render();
});

render();
</script>
</body>
</html>
